{% extends "base_generic.html" %}
{% load widget_tweaks %}
{% load static%}
{% block content %}
<div class="container-fluid p-3">
    
    <div class="card shadow p-2 m-2">
        <!-- Aquí puedes agregar otros controles, pero sin un formulario explícito -->
        <div class="shadow m-2"><h1>Movimientos por Articulos</h1></div>
        <br>
        <div class="row">
            <input type="hidden" id="pfamilia" value="{{id_familia}}">
            <div class="col-md-4">
                <label for="empresa" class="form-label">Empresa</label>
                <select id="empresa" class="form-select">
                    <option value="todos">0 - Todos</option>
                    {% for empresa in empresas %}
                        {% if empresa.id == id_empresa|add:0 %}
                            <option selected value={{empresa.id}}>{{empresa}}</option>
                        {% else %}
                            <option value={{empresa.id}}>{{empresa}}</option>
                        {% endif %}
                    {% endfor %}                    
                </select>
            </div>
            <div class="col-md-4">
                <label for="articulos" class="form-label">Articulos</label>
                <select id="articulo" class="form-select">
                    <option selected value='todos'>Todos</option>
                    {% for articulo in articulos %}
                        <option value={{articulo.id}}>{{articulo}}</option>
                    {% endfor %}                    
                </select>
            </div>
            <div class="col-md-4">
                <label for="familia" class="form-label">Familias</label>
                <select id="familia" class="form-select">
                    <option selected value='todos'>Todas</option>
                    {% for familia in familias %}
                        <option value={{familia.id}}>{{familia}}</option>
                    {% endfor %}                    
                </select>
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col-md-4">
                <label for="tipomov" class="form-label">Tipo Movimiento</label>
                <select id="tipomov" class="form-select">
                    <option selected value='todos'>Todos</option>
                    {% for tipo, descripcion in tipo_movs %}
                        <option value={{tipo}}>{{descripcion}}</option>
                    {% endfor %}                    
                </select>
            </div>
            <div class="col-md-4">
                <label for="fecha_desde" class="form-label">Fecha Desde</label>
                <input type="date" id="fecha_desde" class="form-control" value="{{ fecha_desde|date:'Y-m-d' }}">
            </div>
            <div class="col-md-4">
                <label for="fecha_hasta" class="form-label">Fecha Hasta</label>
                <input type="date" id="fecha_hasta" class="form-control" value="{{ fecha_hasta|date:'Y-m-d' }}">
            </div>
        </div>
        
    </div>
    <br>
    <!-- Tabla para mostrar los resultados -->
    <div class="card shadow p-2 m-2">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Artículo</th>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Doc.</th>
                    <th>Stock</th>
                    <th>Cantidad</th>
                    <th>Nuevo Precio</th>
                    <th>Nuevo Stock</th>
                    <th>Usuario</th>
                </tr>
            </thead>
            <tbody id="movimientos-table-body">
                <!-- Los datos de los movimientos se cargarán aquí dinámicamente vía AJAX -->
            </tbody>
        </table>
    </div>
    <div id="pagination" class="pagination-buttons">
        <!-- Aquí se renderizan los botones de paginación mediante JS -->
    </div>
</div>

<script>
let currentPage = 1;  // Guardar la página actual

function loadMovimientos(page) {
    const empresa = document.getElementById('empresa').value;
    const articulo = document.getElementById('articulo').value;
    const familia = document.getElementById('familia').value;
    const tipomov = document.getElementById('tipomov');
    const tipomovText = tipomov.options[tipomov.selectedIndex].text;
    const fechaDesde = document.getElementById('fecha_desde').value;
    const fechaHasta = document.getElementById('fecha_hasta').value;

    const url = "{% url 'ajax_list_movimientos' %}?empresa=" + encodeURIComponent(empresa) +
                "&articulo=" + encodeURIComponent(articulo) +
                "&familia=" + encodeURIComponent(familia) +
                "&tipomov=" + encodeURIComponent(tipomovText) +
                "&fecha_desde=" + encodeURIComponent(fechaDesde) +
                "&fecha_hasta=" + encodeURIComponent(fechaHasta) +
                "&page=" + page;

    fetch(url, {
        method: 'GET',
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        const tableBody = document.getElementById('movimientos-table-body');
        tableBody.innerHTML = '';  // Limpiar la tabla

        // Iterar sobre los artículos y movimientos agrupados
        for (const articulo in data.movimientos) {
            if (data.movimientos.hasOwnProperty(articulo)) {
                // Agregar una fila de cabecera para el artículo
                const rowHeader = `
                    <tr>
                        <td colspan="9" style="font-weight:bold;background-color: LightSteelBlue;">${articulo}</td>
                    </tr>
                `;
                tableBody.innerHTML += rowHeader;

                // Agregar las filas para los movimientos de ese artículo
                data.movimientos[articulo].forEach(movimiento => {
                    const row = `
                        <tr>
                            <td></td>
                            <td>${movimiento.fechamov}</td>
                            <td>${movimiento.tipomov}</td>
                            <td style="text-align: right;">${movimiento.documento}</td>
                            <td style="text-align: right;">${movimiento.stock}</td>
                            <td style="text-align: right;">${movimiento.cantidad}</td>
                            <td style="text-align: right;">${movimiento.nuevoprecio}</td>
                            <td style="text-align: right;">${movimiento.nuevostock}</td>
                            <td>${movimiento.usuario}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            }
        }

        // Actualizar la paginación
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';  // Limpiar la paginación

        let paginationHtml = `<ul class="pagination">`;

        // Botón de "Anterior"
        if (data.has_previous) {
            paginationHtml += `
                <li class="page-item">
                    <a class="page-link" href="#" onclick="loadMovimientos(${data.page_number - 1})">Previous</a>
                </li>
            `;
        } else {
            paginationHtml += `
                <li class="page-item disabled">
                    <a class="page-link" href="#">Previous</a>
                </li>
            `;
        }

        // Números de página
        for (let i = 1; i <= data.total_pages; i++) {
            paginationHtml += `
                <li class="page-item ${i === data.page_number ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadMovimientos(${i})">${i}</a>
                </li>
            `;
        }

        // Botón de "Siguiente"
        if (data.has_next) {
            paginationHtml += `
                <li class="page-item">
                    <a class="page-link" href="#" onclick="loadMovimientos(${data.page_number + 1})">Next</a>
                </li>
            `;
        } else {
            paginationHtml += `
                <li class="page-item disabled">
                    <a class="page-link" href="#">Next</a>
                </li>
            `;
        }

        paginationHtml += `</ul>`;
        pagination.innerHTML = paginationHtml;
    })
    .catch(error => {
        console.error('Error al cargar los movimientos:', error);
    });
}

// Llamada inicial cuando se carga la página
document.addEventListener("DOMContentLoaded", function() {
    loadMovimientos();
});

// Agregar event listeners para recargar cuando los filtros cambian
document.getElementById('empresa').addEventListener('change', loadMovimientos);
document.getElementById('articulo').addEventListener('change', loadMovimientos);
document.getElementById('familia').addEventListener('change', loadMovimientos);
document.getElementById('tipomov').addEventListener('change', loadMovimientos);
document.getElementById('fecha_desde').addEventListener('change', loadMovimientos);
document.getElementById('fecha_hasta').addEventListener('change', loadMovimientos);
</script>
{% endblock %}

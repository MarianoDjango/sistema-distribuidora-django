<nav class="my-3">
  <ul class="pagination justify-content-center">
    {% if page_obj.has_previous %}
      <li class="page-item">
        <a class="page-link page-nav" data-page="{{ page_obj.previous_page_number }}" href="?page={{ page_obj.previous_page_number }}">Previous</a>
      </li>
    {% endif %}
    
    {% for i in page_obj.paginator.page_range %}
      <li class="page-item {% if i == page_obj.number %}active{% endif %}">
        <a class="page-link page-nav" data-page="{{ i }}" href="?page={{ i }}">{{ i }}</a>
      </li>
    {% endfor %}
    
    {% if page_obj.has_next %}
      <li class="page-item">
        <a class="page-link page-nav" data-page="{{ page_obj.next_page_number }}" href="?page={{ page_obj.next_page_number }}">Next</a>
      </li>
    {% endif %}
  </ul>
</nav>


<html>

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}"/>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <title>Virtual Store</title>
  </head>


<body style="overflow: auto;overflow-x:hidden">
    <div class="row"></div>
    <div class="row">
      <div class="col-lg-12">
        <nav class="navbar navbar-expand-lg" style="background-color: #886565;">
          <div class="container-fluid">
            <div class="col-lg-6">
              <a class="navbar-brand" href="{% url 'landingindex'%}"><img src="{% static '/img/logo.png' %}" class="img-fluid" alt="..." width="200" height="45"></a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
            </div>
          </div>
        </nav>          
      </div>
    </div>


    <div class="container">  
        <!-- Outer Row -->
        <div class="row justify-content-center"> 
            <div class="col-xl-8 col-lg-10 col-md-7"> 
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <!-- Nested Row within Card Body -->
                        <div class="row">
                            <div class="col-lg-6"><img src="{% static '/img/login.png' %}" style="height: 250; width: 500;" class="img-fluid"></div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">Bienvenido!</h1>
                                    </div>
  
                                    {% if form.errors %}
                                    <div class="card bg-warning">
                                        <div class="card-body">
                                            <p class="card-text" style="color: rgb(180, 65, 65); font-weight:500;">Tu Nombre de Usuario y contraseña no coinciden. Por Favor vuelva a intentar.</p>
                                        </div>
                                    </div>
                                    {% endif %}
                                    
                                    <form class="user" method="post" action="{% url 'login' %}">
                                        {% csrf_token %}
                                        <div class="form-group">
                                            <input type="text" name="username" class="form-control form-control-user" 
                                                id="exampleInputEmail" aria-describedby="" 
                                                placeholder="Usuario/E-mail" >
                                        </div>
                                        <p></p>
                                        <div class="form-group">
                                            <input type="password" name="password" class="form-control form-contol-user"
                                                id="exampleInputPassword" aria-describedby="" placeholder="Password" >
                                        </div>
                                        <p></p>
                                        <div>
                                            <input class="btn btn-primary btn-user btn-block" type="submit" value="login" />
                                            <input type="hidden" name="next" value="{{ next }}" />
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>  
            </div>  
        </div>  
    </div>  
</body>


</html>

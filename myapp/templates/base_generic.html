<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="{% static 'bootstrap-5.3.3-dist/css/bootstrap.min.css' %}" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="{% static 'bootstrap-5.3.3-dist/js/bootstrap.bundle.min.js' %}" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>

    
    <link rel="stylesheet" href="{% static  'calendar/fonts/icomoon/style.css'%}">
    
    <link rel="stylesheet" href="{% static  'calendar/css/classic.css'%}">
    <link rel="stylesheet" href="{% static  'calendar/css/classic.date.css'%}">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static  'calendar/css/bootstrap.min.css'%}">
    
    <!-- Style   -->  
    <link rel="stylesheet" href="{% static  'calendar/css/style.css'%}">
    <link rel="stylesheet" href="{% static  'css/style.css'%}">
    
    <title>Distribuidora Silva</title>
  </head>

  <body style="overflow: auto;overflow-x:hidden">
    <div class="row"></div>
    <div class="row">
      <div class="col-lg-12">
        <nav class="navbar navbar-expand-lg" style="background-color: #886565;">
          <div class="container-fluid">
            <div class="col-lg-6">
              <a class="navbar-brand" href="{% url 'landingindex'%}"><img src="{% static '/img/logo.png' %}" class="img-fluid" alt="..." width="200" height="45"></a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
            </div>
          </div>
          <div class="col-lg-2">
          {% if user.is_authenticated %}
            <div class="dropdown">
              <a class="btn btn-secondary position-relative" role="button" data-bs-toggle="dropdown" aria-expanded="false">{{user}}
                <i class="bi bi-person-fill"></i><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
                  <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                </svg>
              </a>    
              <ul class="dropdown-menu">
                <li>
                  <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="dropdown-item" style="border:none; background:none; padding:10;">Salir</button>
                  </form>
                </li>
              </ul>
          {% else %}
            <div class="col-lg-7"></div>
            <div class="col-lg-2">
              <a class="btn btn-secondary" href="{% url 'login' %}" aria-expanded="false">Entrar
              </a>
            </div>
          {% endif %}
          </div>
        </nav>          
      </div>
    </div>
</body>
  {% block content %}{% endblock %}
  <footer class="bd-footer py-4 py-md-5 mt-5 bg-light">
    <div class="container py-4 py-md-5 px-4 px-md-3">
      <div class="row">
        <div class="col-lg-9 mb-9">
          <a class="d-inline-flex align-items-center mb-2 link-dark text-decoration-none" href="/" aria-label="Bootstrap">
            <img src="{% static '/img/logo.png' %}" class="img-fluid" alt="..." width="200" height="45">
          </a>
          <ul class="list-unstyled small text-muted">
            <li class="mb-2"><a href="https://api.whatsapp.com/send?phone=+541112345678&text=Hola" target="_blank" title="contactar por Whatsapp"><img src="{% static '/img/whatsapp_PNG20.png' %}" class="img-fluid" alt="..." width="30"></a>  11-1234-3456</li>
            <li class="mb-2">Av. Inexistente 2300 </li>
            <li class="mb-2">Argentina</li>
          </ul>
        </div>
      </div>
    </div>
  </footer>
  <script src="{% static 'calendar/js/jquery-3.3.1.min.js'%}"></script>
  <script src="{% static 'calendar/js/popper.min.js'%}"></script>
  <script src="{% static 'calendar/js/bootstrap.min.js'%}"></script>
  <script src="{% static 'calendar/js/picker.js'%}"></script>
  <script src="{% static 'calendar/js/picker.date.js'%}"></script>
  <script src="{% static 'calendar/js/main.js'%}"></script>

</html>
